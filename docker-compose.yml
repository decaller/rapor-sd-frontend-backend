services:

  # ── Backend (Express / Node.js) ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend-sheet-aggregator-rapor
      dockerfile: Dockerfile
    container_name: rapor-backend
    restart: unless-stopped
    environment:
      PORT: ${BACKEND_PORT:-3000}
      DOMAIN: ${DOMAIN:-localhost}
      DB_PATH: /app/database/database.sqlite
      API_SECRET_KEY: ${API_SECRET_KEY}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      ROOT_DRIVE_FOLDER: ${ROOT_DRIVE_FOLDER}
      BACKUP_DRIVE_FOLDER: ${BACKUP_DRIVE_FOLDER}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_CLIENT_EMAIL: ${GCP_CLIENT_EMAIL}
      GCP_PRIVATE_KEY: ${GCP_PRIVATE_KEY}
      RUN_SYNC_ON_STARTUP: "true"
    volumes:
      # Persist the SQLite database across container restarts
      - backend_data:/app/database
    expose:
      - "${BACKEND_PORT:-3000}"
    networks:
      - rapor-internal
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:${BACKEND_PORT:-3000}/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend (Astro static) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend-astro-rapor
      dockerfile: Dockerfile
    container_name: rapor-frontend
    restart: unless-stopped
    expose:
      - "4321"
    networks:
      - rapor-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4321/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Caddy (Reverse Proxy) ────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: rapor-caddy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      BACKEND_PORT: ${BACKEND_PORT:-3000}
      API_SECRET_KEY: ${API_SECRET_KEY}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - rapor-internal
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        cat <<'EOF' > /etc/caddy/Caddyfile
        {
            # Global options
        }
        {$$DOMAIN} {
            handle /api/* {
                reverse_proxy backend:{$$BACKEND_PORT:3000}
            }
            handle {
                reverse_proxy frontend:4321
            }
            # Logging
            log {
                output stdout
                format console
            }
        }
        EOF
        caddy run --config /etc/caddy/Caddyfile --adapter caddyfile

# ── Named Volumes ──────────────────────────────────────────────────────────────
volumes:
  backend_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

# ── Network ────────────────────────────────────────────────────────────────────
networks:
  rapor-internal:
    driver: bridge
